; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
boards_dir = boards

; ---------- Shared base ----------

[env_common]
platform = espressif32@6.10.0
framework = arduino
upload_speed = 921600
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
board_build.partitions = partitions.csv
extra_scripts =
	pre:tools/platformio_git_hash.py
build_flags =
	-DBOARD_HAS_PSRAM
	-DPSRAM_SPEED=120MHz
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DCORE_DEBUG_LEVEL=0
	-DDISABLE_ALL_LIBRARY_WARNINGS
	-DWIFI_OFF=1
	-O3
	-Wl,--gc-sections
	-Isrc/mesh/companion
	-DLV_CONF_INCLUDE_SIMPLE
	-Ilib

	-DRADIOLIB_STATIC_ONLY=1
	-DRADIOLIB_GODMODE=1
	-DESP32
	-DUSE_SX1262
	-DRADIO_CLASS=CustomSX1262
	-DWRAPPER_CLASS=CustomSX1262Wrapper

	-DLORA_FREQ=869.618
	-DLORA_BW=62.5
	-DLORA_SF=8
	-DLORA_TX_POWER=22
	-DLORA_CR=5

	-DMAX_CONTACTS=50
	-DMAX_GROUP_CHANNELS=40
	-DENABLE_ADVERT_ON_BOOT=1
	-DENABLE_PRIVATE_KEY_IMPORT=1
	-DENABLE_PRIVATE_KEY_EXPORT=1

	-DENV_INCLUDE_GPS=1
	-DENV_SKIP_GPS_DETECT=1

	-DBLE_PIN_CODE=123456
	-DBLE_NAME_PREFIX='"MeshCore-"'
	-DOFFLINE_QUEUE_SIZE=64

	-DRADIOLIB_EXCLUDE_CC1101=1
	-DRADIOLIB_EXCLUDE_RF69=1
	-DRADIOLIB_EXCLUDE_SX1231=1
	-DRADIOLIB_EXCLUDE_SI443X=1
	-DRADIOLIB_EXCLUDE_RFM2X=1
	-DRADIOLIB_EXCLUDE_SX128X=1
	-DRADIOLIB_EXCLUDE_AFSK=1
	-DRADIOLIB_EXCLUDE_AX25=1
	-DRADIOLIB_EXCLUDE_HELLSCHREIBER=1
	-DRADIOLIB_EXCLUDE_MORSE=1
	-DRADIOLIB_EXCLUDE_APRS=1
	-DRADIOLIB_EXCLUDE_BELL=1
	-DRADIOLIB_EXCLUDE_RTTY=1
	-DRADIOLIB_EXCLUDE_SSTV=1
lib_deps =
	Wire
	SPI
	jgromes/RadioLib @ ^7.6.0
	rweather/Crypto @ ^0.4.0
	densaugeo/base64 @ ~1.4.0
	electroniccats/CayenneLPP @ 1.6.1
	lvgl/lvgl@^9.5.0
	stevemarple/MicroNMEA @ ^2.0.6
	lewisxhe/SensorLib @ ^0.4.1
	lewisxhe/XPowersLib @ ^0.3.3
	mathertel/OneButton @ ^2.6.1
	adafruit/RTClib @ ^2.1.3

; ---------- LilyGo T5 ePaper S3 PRO ----------

[env:t5-epaper]
extends = env_common
board = T5-ePaper-S3
build_flags =
	${env_common.build_flags}
	-DBOARD_EPAPER=1
	-DSPI_FREQUENCY=80000000

	-DP_LORA_NSS=46
	-DP_LORA_DIO_1=10
	-DP_LORA_RESET=1
	-DP_LORA_BUSY=47
	-DP_LORA_SCLK=14
	-DP_LORA_MISO=21
	-DP_LORA_MOSI=13
	-DSX126X_DIO2_AS_RF_SWITCH=true
	-DSX126X_DIO3_TCXO_VOLTAGE=1.8
	-DSX126X_CURRENT_LIMIT=140
	-DSX126X_RX_BOOSTED_GAIN=1

	-DPIN_GPS_TX=44
	-DPIN_GPS_RX=43
build_src_filter =
	+<*>
	-<board_tdeck.cpp>
	-<ui/ui_port_tft.cpp>
	-<mesh/companion/target_tdeck.cpp>
lib_deps =
	${env_common.lib_deps}

; ---------- LilyGo T-Deck ----------

[env:tdeck]
extends = env_common
board = T-Deck
build_flags =
	${env_common.build_flags}
	-DBOARD_TDECK=1
	-DSCREEN_WIDTH=320
	-DSCREEN_HEIGHT=240

	; T-Deck SPI bus
	-DTDECK_SPI_MOSI=41
	-DTDECK_SPI_MISO=38
	-DTDECK_SPI_SCLK=40

	; LoRa pins
	-DP_LORA_NSS=9
	-DP_LORA_DIO_1=45
	-DP_LORA_RESET=17
	-DP_LORA_BUSY=13
	-DP_LORA_SCLK=40
	-DP_LORA_MISO=38
	-DP_LORA_MOSI=41
	-DSX126X_DIO2_AS_RF_SWITCH=true
	-DSX126X_DIO3_TCXO_VOLTAGE=1.8
	-DSX126X_CURRENT_LIMIT=140
	-DSX126X_RX_BOOSTED_GAIN=1

	; Display (ST7789)
	-DTDECK_DISP_CS=12
	-DTDECK_DISP_DC=11
	-DTDECK_DISP_BL=42
	-DTDECK_DISP_RST=-1

	; Touch (GT911)
	-DTDECK_TOUCH_SDA=18
	-DTDECK_TOUCH_SCL=8
	-DTDECK_TOUCH_INT=16

	; I2C bus
	-DTDECK_I2C_SDA=18
	-DTDECK_I2C_SCL=8

	; GPS
	-DPIN_GPS_TX=43
	-DPIN_GPS_RX=44

	; SD card
	-DTDECK_SD_CS=39

	; Power enable
	-DTDECK_POWER_EN=10

	; Battery ADC
	-DTDECK_BAT_ADC=4

	; Keyboard
	-DTDECK_KB_ADDR=0x55
	-DTDECK_KB_INT=-1

	; Trackball
	-DTDECK_TB_UP=2
	-DTDECK_TB_DOWN=3
	-DTDECK_TB_LEFT=1
	-DTDECK_TB_RIGHT=15
	-DTDECK_TB_CLICK=0
build_src_filter =
	+<*>
	-<board_epaper.cpp>
	-<io_extend.c>
	-<ui/ui_port_epaper.cpp>
	-<mesh/companion/target.cpp>
lib_deps =
	${env_common.lib_deps}
